{% extends "layout.html" %}

{% block title %}My Tokens - SmartRation{% endblock %}
{% block page_title %}My Ration Tokens 🎫{% endblock %}

{% block content %}
<div id="tokenGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem;">
    <!-- Tokens loaded here -->
</div>

<!-- QR Modal -->
<div id="qrModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 3000; align-items: center; justify-content: center;">
    <div class="glass-card" style="max-width: 400px; width: 90%; text-align: center; border: 1px solid rgba(255,255,255,0.1);">
        <h3 id="mTokenId" class="gradient-text" style="font-size: 1.5rem; font-weight: 800; margin-bottom: 1.5rem;">TOKEN ID</h3>
        <div id="mQR" style="background: white; padding: 1.5rem; border-radius: 20px; display: inline-block; margin-bottom: 1.5rem;"></div>
        <p id="mSlot" style="font-weight: 700; color: #e0e7ff; margin-bottom: 0.5rem;"></p>
        <p id="mShop" style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;"></p>
        <button class="btn-primary" style="width: 100%; justify-content: center;" onclick="document.getElementById('qrModal').style.display='none'">Close Receipt</button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function loadTokens() {
        const res = await fetch('/api/tokens/my-tokens', { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();
        const grid = document.getElementById('tokenGrid');
        grid.innerHTML = '';
        
        if (data.tokens.length === 0) {
            grid.innerHTML = '<div class="glass-card" style="grid-column: 1/-1; text-align: center; padding: 4rem;"><h3>No tokens found</h3><p style="color: var(--text-muted); margin-top: 1rem;">Go to Book Slot to generate your first token.</p></div>';
            return;
        }

        data.tokens.forEach(t => {
            const statusColor = t.status === 'booked' ? 'warning' : (t.status === 'completed' ? 'success' : 'danger');
            grid.innerHTML += `
                <div class="glass-card animate-fade-in" style="border-left: 4px solid ${t.status === 'booked' ? '#f59e0b' : '#10b981'};">
                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 1.5rem;">
                        <h4 style="font-weight: 800; color: #e0e7ff;">${t.token_id}</h4>
                        <span class="badge badge-${statusColor}">${t.status}</span>
                    </div>
                    <div style="margin-bottom: 1.5rem;">
                        <div style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.25rem;">SHOP LOCATION</div>
                        <div style="font-weight: 600;">🏪 ${t.shop_name}</div>
                    </div>
                    <div style="margin-bottom: 2rem;">
                        <div style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.25rem;">APPOINTMENT SLOT</div>
                        <div style="font-weight: 600;">📅 ${new Date(t.slot_time).toLocaleString()}</div>
                    </div>
                    
                    <div style="display: flex; gap: 0.75rem;">
                        ${t.status === 'booked' ? `
                            <button onclick="showQR('${t.token_id}', '${t.qr_code}', '${t.slot_time}', '${t.shop_name}')" class="btn-primary" style="flex: 2; justify-content: center;">View QR</button>
                            <button onclick="cancelToken('${t.token_id}')" class="btn-primary" style="flex: 1; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #f87171; justify-content: center;">Cancel</button>
                        ` : `
                            <button class="btn-primary" style="width: 100%; justify-content: center; opacity: 0.5; cursor: not-allowed;">Distribution Complete</button>
                        `}
                    </div>
                </div>
            `;
        });
    }

    async function cancelToken(id) {
        if (!confirm('Are you sure you want to cancel this booking?')) return;
        const res = await fetch(`/api/tokens/${id}/cancel`, {
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
            alert('Token Cancelled');
            loadTokens();
        }
    }

    function showQR(id, qr, slot, shop) {
        document.getElementById('mTokenId').innerText = id;
        document.getElementById('mQR').innerHTML = `<img src="${qr}" style="width: 250px; height: 250px;">`;
        document.getElementById('mSlot').innerText = new Date(slot).toLocaleString();
        document.getElementById('mShop').innerText = shop;
        document.getElementById('qrModal').style.display = 'flex';
    }

    loadTokens();
</script>
{% endblock %}
