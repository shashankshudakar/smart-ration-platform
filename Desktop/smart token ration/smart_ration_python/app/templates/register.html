<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SmartRation</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-container">
    <div class="auth-card animate-fade-in" style="max-width: 500px; padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <img src="/static/img/logo.png" alt="Logo" style="width: 56px; height: 56px; border-radius: 12px; margin: 0 auto 1.5rem; display: block; object-fit: cover;">
            <h2 style="font-size: 1.75rem; font-weight: 800;">Create Account</h2>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Join the digital distribution network</p>
            <a href="/" style="display: inline-block; margin-top: 1rem; color: var(--text-muted); text-decoration: none; font-size: 0.85rem; font-weight: 600;">← Back to Home</a>
        </div>

        <form id="regForm">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem;">
                <div>
                    <label class="input-label">FULL NAME</label>
                    <input type="text" id="name" class="input-field" placeholder="John Doe" required>
                </div>
                <div>
                    <label class="input-label">MOBILE</label>
                    <input type="text" id="mobile" class="input-field" placeholder="9876543210" required>
                </div>
            </div>
            
            <div style="margin-bottom: 1.25rem;">
                <label class="input-label">RATION CARD NUMBER</label>
                <input type="text" id="rationCard" class="input-field" placeholder="KA-2026-XXXX" required>
            </div>


            <div style="margin-bottom: 2rem;">
                <label class="input-label">SET PASSWORD</label>
                <input type="password" id="password" class="input-field" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 1rem;">
                Complete Registration
            </button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem;">
            <p style="color: var(--text-muted); font-size: 0.85rem;">
                Already have an account? <a href="/login" style="color: var(--primary); text-decoration: none; font-weight: 600;">Login</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                mobile: document.getElementById('mobile').value,
                ration_card_number: document.getElementById('rationCard').value,
                password: document.getElementById('password').value
            };

            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                alert('Registration Successful! Please login.');
                window.location.href = '/login';
            } else {
                const err = await res.json();
                alert(err.detail);
            }
        });
    </script>
    {% include 'chatbot_partial.html' %}
</body>
</html>
