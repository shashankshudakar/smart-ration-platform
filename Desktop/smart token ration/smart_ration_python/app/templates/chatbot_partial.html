<style>
    /* Chatbot Styles */
    .chat-widget {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        z-index: 10000;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
    }

    .chat-button {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: var(--primary);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        border: none;
    }

    .chat-button:hover {
        transform: scale(1.1) rotate(5deg);
    }

    .chat-window {
        width: 350px;
        height: 500px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        margin-bottom: 1rem;
        display: none;
        flex-direction: column;
        box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        overflow: hidden;
        animation: slideInUp 0.4s ease-out;
    }

    @keyframes slideInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .chat-header {
        padding: 1.25rem;
        background: rgba(255,255,255,0.05);
        border-bottom: 1px solid rgba(255,255,255,0.1);
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .chat-body {
        flex-grow: 1;
        padding: 1rem;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        scrollbar-width: thin;
    }

    .chat-message {
        max-width: 80%;
        padding: 0.75rem 1rem;
        border-radius: 15px;
        font-size: 0.9rem;
        line-height: 1.4;
    }

    .bot-msg {
        background: rgba(255,255,255,0.1);
        align-self: flex-start;
        border-bottom-left-radius: 2px;
    }

    .user-msg {
        background: var(--primary);
        color: white;
        align-self: flex-end;
        border-bottom-right-radius: 2px;
    }

    .chat-footer {
        padding: 1rem;
        display: flex;
        gap: 0.5rem;
        background: rgba(0,0,0,0.2);
    }

    .chat-input {
        flex-grow: 1;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px;
        padding: 0.6rem 1rem;
        color: white;
        font-size: 0.9rem;
        outline: none;
    }

    .chat-input:focus {
        border-color: var(--primary);
    }
</style>

<div class="chat-widget">
    <div id="chatWindow" class="chat-window">
        <div class="chat-header">
            <div style="width: 10px; height: 10px; background: #10b981; border-radius: 50%;"></div>
            <div>
                <div style="font-weight: 700; font-size: 0.95rem;">SmartRation AI</div>
                <div style="font-size: 0.7rem; color: #10b981;">Online & Ready to help</div>
            </div>
        </div>
        <div id="chatBody" class="chat-body">
            <div class="chat-message bot-msg">
                Namaste! I am your SmartRation Assistant. How can I help you today?
            </div>
        </div>
        <div class="chat-footer">
            <input type="text" id="chatInput" class="chat-input" placeholder="Type your question..." onkeypress="handleChatKey(event)">
            <button onclick="sendMessage()" style="background: var(--primary); border: none; border-radius: 10px; width: 40px; color: white; cursor: pointer;">→</button>
        </div>
    </div>
    <button class="chat-button" onclick="toggleChat()">
        <svg id="chatIcon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
    </button>
</div>

<script>
    function toggleChat() {
        const win = document.getElementById('chatWindow');
        const icon = document.getElementById('chatIcon');
        if (win.style.display === 'flex') {
            win.style.display = 'none';
            icon.innerHTML = '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>';
        } else {
            win.style.display = 'flex';
            icon.innerHTML = '<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>';
            document.getElementById('chatInput').focus();
        }
    }

    function handleChatKey(e) {
        if (e.key === 'Enter') sendMessage();
    }

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const body = document.getElementById('chatBody');
        const msg = input.value.trim();
        if (!msg) return;

        body.innerHTML += `<div class="chat-message user-msg">${msg}</div>`;
        input.value = '';
        body.scrollTop = body.scrollHeight;

        const loadingId = 'bot-loading-' + Date.now();
        body.innerHTML += `<div id="${loadingId}" class="chat-message bot-msg" style="opacity: 0.5;">Typing...</div>`;
        body.scrollTop = body.scrollHeight;

        try {
            const res = await fetch('/api/chatbot/ask', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('token')}`
                },
                body: JSON.stringify({ message: msg })
            });
            const data = await res.json();
            document.getElementById(loadingId).remove();
            body.innerHTML += `<div class="chat-message bot-msg">${data.response}</div>`;
        } catch (err) {
            if (document.getElementById(loadingId)) document.getElementById(loadingId).remove();
            body.innerHTML += `<div class="chat-message bot-msg">Sorry, I'm having trouble connecting. Please try again.</div>`;
        }
        body.scrollTop = body.scrollHeight;
    }
</script>
